<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cachorros</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<main class="container">

    <!-- Botão para gerar novo cachorro -->
    <section class="areabotao">
        <button id="buscarbtn" aria-label="Gerar novo cachorro">
            Novo cachorro 
        </button>
    </section>

    <!-- Card do cachorro -->
    <section class="resultado">

        <article class="cardcachorro">

            <!-- Conteúdo horizontal: imagem + informações -->
            <div class="card-content">
                
                <!-- Imagem redonda -->
                <img id="img" class="imagemdocao" alt="Imagem do cachorro">

                <!-- Informações -->
                <div class="informacoes">

                    <div class="infoitem">
                        <p class="nome">Nome do cão:</p>
                        <p class="resposta1"></p>
                    </div>

                    <div class="infoitem">
                        <p class="temperamento">Temperamento:</p>
                        <p class="resposta2"></p>
                    </div>

                    <div class="infoitem">
                        <p class="tempovida">Expectativa de vida:</p>
                        <p class="resposta3"></p>
                    </div>

                    <div class="infoitem">
                        <p class="origem">Origem:</p>
                        <p class="resposta4"></p>
                    </div>

                </div>

            </div>

        </article>

    </section>

</main>

</body>
</html>
